<div class="min-h-screen bg-slate-950 flex items-center justify-center relative overflow-hidden">

  <div class="absolute inset-0"
       style="background-image:linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),
              linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px);
              background-size:48px 48px"></div>

  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px]
              bg-blue-600/8 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-sm px-4">

    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600
                  mb-5 shadow-2xl shadow-blue-600/50 ring-1 ring-blue-500/40">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01
               M4 19V7a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-black text-white tracking-tight">
        Cobranza<span class="text-blue-400">Pro</span>
      </h1>
      <p class="text-slate-500 text-sm mt-2">Sistema de gestión de facturas · Perú</p>
    </div>

    <div class="bg-slate-900/80 backdrop-blur border border-slate-800 rounded-2xl p-7 shadow-2xl">

      <h2 class="text-white font-bold text-lg mb-6">Iniciar sesión</h2>

      @if (error()) {
        <div class="mb-5 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-xl
                    text-red-400 text-sm flex items-center gap-2">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          {{ error() }}
        </div>
      }

      <div class="space-y-4">
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Usuario</label>
          <input [(ngModel)]="username" type="text" placeholder="Tu usuario"
                 autocomplete="username"
                 class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3
                        text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30
                        transition placeholder-slate-600"/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Contraseña</label>
          <input [(ngModel)]="password" type="password" placeholder="••••••••"
                 autocomplete="current-password"
                 (keyup.enter)="login()"
                 class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3
                        text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30
                        transition placeholder-slate-600"/>
        </div>

        <button (click)="login()" [disabled]="loading()"
                class="w-full mt-1 bg-blue-600 hover:bg-blue-500 active:bg-blue-700
                       disabled:opacity-50 disabled:cursor-not-allowed
                       text-white font-bold py-3 rounded-xl transition-all
                       shadow-lg shadow-blue-600/30 text-sm">
          @if (loading()) {
            <span class="inline-flex items-center justify-center gap-2">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Verificando...
            </span>
          } @else {
            Ingresar al sistema
          }
        </button>
      </div>
    </div>

    <p class="text-center text-slate-700 text-xs mt-6">
      © {{ year }} CobranzaPro · Todos los derechos reservados
    </p>
  </div>
</div>
